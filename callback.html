<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OAuth Callback</title>
</head>
<body>
    <h2>Processing Authentication...</h2>

    <script>
        async function handleCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const error = urlParams.get('error');

            if (error) {
                document.body.innerHTML += `<p style="color:red">Error: ${error}</p>`;
                return;
            }

            if (code) {
                // Send code to main window
                if (window.opener) {
                    window.opener.postMessage({ type: 'oauth_callback', code: code }, '*');
                } else {
                    // If not popup, redirect back to index.html with code
                    window.location.href = '/lightningout-demo/?code=' + code;
                }
                window.close();
            }
        }

        window.onload = handleCallback;
    </script>
</body>
</html>
