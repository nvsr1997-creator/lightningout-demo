<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightning Out 2.0 Demo</title>
    
    <script type="text/javascript" async src="https://siva15071997-dev-ed.my.salesforce.com/lightning/lightning.out.latest/index.iife.prod.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        h1 { color: #0070d2; }
    </style>
</head>
<body>
    <h1>Lightning Out 2.0 Testing</h1>
    <p>Simple Name Display Component</p>

    <!-- Lightning Out Container - Empty undali -->
    <lightning-out-application 
        id="loApp"
        app-id="1UsIf0000004DAMKA2" 
        components="c-name-display"
        frontdoor-url="">
    </lightning-out-application>

    <div id="componentContainer"></div>   <!-- ← Component dynamically add avuthundi -->

    <script>
        // Events
        document.addEventListener('lo.application.ready', () => {
            console.log('✅ Lightning Out 2.0 Ready!');
            
            // Dynamically create and add your component
            const container = document.getElementById('componentContainer');
            const nameComp = document.createElement('c-name-display');
            container.appendChild(nameComp);
        });

        document.addEventListener('lo.component.ready', (event) => {
            console.log('✅ Component Ready:', event.detail);
        });

        document.addEventListener('lo.component.error', (event) => {
            console.error('❌ Error:', event.detail);
        });
    </script>
</body>
</html>
