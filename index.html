<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salesforce Lightning Out 2.0 Demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.15.8/styles/salesforce-lightning-design-system.min.css" />
    
    <style>
        body {
            padding: 20px;
            background-color: #f3f4f6;
            font-family: 'Salesforce Sans', Arial, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .login-box {
            text-align: center;
            padding: 40px;
        }
    </style>

    <script type="text/javascript" src="https://siva15071997-dev-ed.my.salesforce.com/lightning/lightning.out.latest/index.iife.prod.js"></script>
</head>
<body>

    <div class="container">
        <div class="slds-brand-band slds-brand-band_medium">
            <h1 class="slds-text-heading_large slds-m-bottom_medium">Third-Party Portal (GitHub Pages)</h1>
            <p class="slds-text-body_leading slds-m-bottom_xlarge">This portal hosts a secure Salesforce Lightning Web Component using Lightning Out 2.0.</p>
        </div>

        <hr class="slds-m-vertical_large" />

        <div id="loginSection" class="login-box">
            <p class="slds-m-bottom_medium slds-text-color_weak">If the component doesn't load automatically, please authenticate with Salesforce:</p>
            <button class="slds-button slds-button_brand" onclick="loginToSalesforce()">
                Login to Salesforce Org
            </button>
        </div>

        <div id="lightningOutContainer" style="display:none;">
            <lightning-out-application app-id="1UsIf0000004DAMKA2" components="c-external-demo-component"></lightning-out-application>
            
            <c-external-demo-component></c-external-demo-component>
        </div>
    </div>

    <script>
        // కాన్ఫిగరేషన్ డీటెయిల్స్
        const ORG_URL = "https://siva15071997-dev-ed.my.salesforce.com";
        const CLIENT_ID = "3MVG9n_HvETGhr3DGIEyTb2PfjZeBM9JVs57xvMav0P79W20cMf5oy._0T.wk2hQIqYN8DNO7Mg5ntt54Z9cn"; // 👈 నీ Connected App 'Consumer Key' ని ఇక్కడ రీప్లేస్ చెయ్!
        const REDIRECT_URI = "https://nvsr1997-creator.github.io/lightningout-demo/";

        // 1. పేజీ లోడ్ అవ్వగానే URL లో Access Token ఉందేమో చెక్ చేస్తుంది
        window.onload = function() {
            const hash = window.location.hash;
            if (hash && hash.includes("access_token=")) {
                // టోకెన్ దొరికితే లాగిన్ బటన్ దాచేసి, కాంపోనెంట్ కంటైనర్ చూపిస్తుంది
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("lightningOutContainer").style.display = "block";
                
                console.log("🔒 Salesforce Authentication Successful via OAuth!");
            } else {
                // టోకెన్ లేకపోతే, ఒకవేళ బ్రౌజర్ లో ఆల్రెడీ సేల్స్ ఫోర్స్ లాగిన్ అయి ఉంటే డైరెక్ట్ గా ట్రై చేయడానికి కంటైనర్ ని ఆన్ లో ఉంచుతాం
                document.getElementById("lightningOutContainer").style.display = "block";
            }
        }

        // 2. లాగిన్ బటన్ క్లిక్ చేసినప్పుడు సేల్స్‌ఫోర్స్ కి రీడైరెక్ట్ చేసే ఫంక్షన్
        function loginToSalesforce() {
            const authUrl = `${ORG_URL}/services/oauth2/authorize?response_type=token&client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
            window.location.href = authUrl;
        }
    </script>

</body>
</html>
