<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightning Out 2.0 Demo</title>
    
    <script type="text/javascript" async src="https://siva15071997-dev-ed.my.salesforce.com/lightning/lightning.out.latest/index.iife.prod.js"></script>
    
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            background: #f4f6f9;
        }
        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            background: #0070d2; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
        }
        button:hover { background: #005bb8; }
        #status { 
            margin: 15px 0; 
            font-weight: bold; 
            padding: 10px; 
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Lightning Out 2.0 Testing</h1>
    <p>Simple Name Display Component</p>

    <button onclick="startLogin()">Login to Salesforce & Load Component</button>
    
    <div id="status"></div>

    <!-- Lightning Out Container - MUST BE EMPTY -->
    <lightning-out-application 
        id="loApp"
        app-id="1UsIf0000004DAMKA2" 
        components="c-name-display"
        frontdoor-url="">
    </lightning-out-application>

    <div id="componentContainer" style="margin-top: 30px; border: 1px solid #ddd; padding: 20px; min-height: 120px; background: white;"></div>

    <script>
        const CLIENT_ID = "3MVG9n_HvETGhr3DGIEyTb2PfjZeBM9JVs57xvMav0P79W20cMf5oy._0T.wk2hQIqYN8DNO7Mg5ntt54Z9cn";
        const CLIENT_SECRET = "A219134791E1A804F4507D04B0245CA0AC94A5CD0677F6E9081FB67B2987A971";
        const REDIRECT_URI = "https://nvsr1997-creator.github.io/lightningout-demo/callback.html";
        const ORG_URL = "https://siva15071997-dev-ed.my.salesforce.com";

        async function startLogin() {
            document.getElementById('status').innerHTML = 'Redirecting to Salesforce Login...';
            document.getElementById('status').style.color = 'blue';

            const authUrl = `${ORG_URL}/services/oauth2/authorize?` +
                `response_type=code` +
                `&client_id=${encodeURIComponent(CLIENT_ID)}` +
                `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}` +
                `&scope=web full api` +
                `&state=lo2demo`;

            window.location.href = authUrl;
        }

        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (code) {
                document.getElementById('status').innerHTML = 'Exchanging token...';
                await exchangeCodeForToken(code);
            }
        };

        async function exchangeCodeForToken(code) {
            try {
                const response = await fetch(`${ORG_URL}/services/oauth2/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        client_id: CLIENT_ID,
                        client_secret: CLIENT_SECRET,
                        redirect_uri: REDIRECT_URI,
                        code: code
                    })
                });

                const data = await response.json();

                if (data.access_token) {
                    document.getElementById('status').innerHTML = '✅ Login Successful! Loading Component...';
                    document.getElementById('status').style.color = 'green';
                    
                    const frontdoorUrl = `${ORG_URL}/secur/frontdoor.jsp?sid=${data.access_token}`;
                    
                    const loApp = document.getElementById('loApp');
                    loApp.setAttribute('frontdoor-url', frontdoorUrl);

                    // Load the component
                    setTimeout(() => {
                        const container = document.getElementById('componentContainer');
                        container.innerHTML = `<c-name-display></c-name-display>`;
                    }, 800);

                } else {
                    document.getElementById('status').innerHTML = '❌ Token exchange failed: ' + (data.error_description || data.error);
                    document.getElementById('status').style.color = 'red';
                    console.error(data);
                }
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerHTML = '❌ Error: ' + err.message;
                document.getElementById('status').style.color = 'red';
            }
        }
    </script>
</body>
</html>
